services:
  - type: web
    name: electronics-store-api
    runtime: node
    plan: free
    region: oregon
    rootDir: trusan-electronics-store/backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: FRONTEND_URL
        sync: false
